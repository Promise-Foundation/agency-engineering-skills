[pytest]
# Registers the hypothesize traceability/evidence-role tags used as pytest
# markers in research/tests/test_composition.py, so they're recognized rather
# than warned about. See ../hypothesize/references/tag-vocabulary.md.
markers =
    hyp_engine_decoupling: HYP-ENGINE-DECOUPLING traceability tag
    cap_no_cross_import: CAP-NO-CROSS-IMPORT traceability tag
    hyp_bridge_preserves_logic: HYP-BRIDGE-PRESERVES-LOGIC traceability tag
    cap_bridge_separation: CAP-BRIDGE-SEPARATION traceability tag
    evidence_mechanism: hypothesize evidence-role tag (bounded mechanism demonstration)
    synthetic_fixture: hypothesize control tag (data is synthetic, a maturity ceiling)
