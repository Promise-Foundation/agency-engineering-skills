  basis: observed
  evidence_refs:
  - EVD-1
- id: IO-1
  kind: intermediate_objective
  statement: A validated remote-work question tree exists
  satisfaction: unsatisfied
- id: ER-1
  kind: existing_reality
  statement: Findings live in flat, unaddressed notes
- id: NEED-1
  kind: need
  statement: Findings need stable addresses to accumulate
- id: ACT-1
  kind: transition_action
  statement: Map the three Ctrip findings to the question tree
- id: IE-1
  kind: immediate_effect
  statement: Each finding shows a visible scope, relation, and source
- id: CONSTRAINT-1
  kind: constraint
  statement: No stable scaffold admits accumulating remote-work evidence
  evidence_refs:
  - EVD-1
- id: NBR-1
  kind: negative_branch
  statement: The tree becomes rigid and discourages new questions
