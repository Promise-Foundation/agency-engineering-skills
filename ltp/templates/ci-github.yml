# Example CI for a repository that hosts an ltp model. Copy into
# .github/workflows/ and adjust paths. Fails on invalid logic, stale generated
# projections, or a dashboard that no longer builds.
name: ltp

on: [push, pull_request]

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ltp
      - run: python -m pytest ltp/tests -q
      - run: python -m ltp.schema --check          # generated schema/types/catalog are current
        working-directory: ltp
        env:
          PYTHONPATH: src
      - run: ltp --root . validate --strict         # the model's logic must hold
      - run: ltp --root . check                      # generated projections must be current

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: ltp/dashboard
      - run: npm run build
        working-directory: ltp/dashboard
