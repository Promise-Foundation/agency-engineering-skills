apiVersion: norms/v1
kind: Promise
metadata:
  domain: /interface
  name: _renders_only_generated_data
  title: The interface renders only previously generated data
  tags:
    - agency-ui
    - architecture
spec:
  statement: >-
    Subjects within this domain OUGHT to render only data previously
    generated by a skill's own tooling, and OUGHT NOT recompute domain logic
    -- validation, inheritance, trust, or scoring -- in the browser.
  scope:
    subjects:
      - agency-ui plugins
  criteria:
    kind: documentation-review
    instructions: >-
      Confirm the interface reads a normalized JSON manifest per skill
      through its ResourceSource contract, and that no plugin view
      recomputes the skill's own derivations.
  source:
    authority: agency-ui/README.md
    kind: architecture-documentation
    rationale: >-
      agency-ui/README.md states "The shell renders whatever the engines
      previously generated; it never re-derives anything," and read-only
      sources declare `determinism: static` with no `apply` capability.
