# Run the repo-composition acceptance suite, then enforce that the committed
# research status (research/generated/research-status.json, README.md's
# generated region) is current. `hypothesize check` writes nothing and exits
# non-zero if any published target is stale or traceability is broken, so a PR
# that changes promisify/hypothesize/ltp source without regenerating the
# status (via `make research-status`) fails here.

name: Research status is current

on:
  push:
  pull_request:

jobs:
  research-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install engines and test tooling
        run: |
          python -m pip install -e ./hypothesize -e ./ltp
          python -m pip install pytest pytest-json-report PyYAML jsonschema

      - name: Repo-composition acceptance suite -> report
        run: make research-report

      - name: Research publication is current
        run: hypothesize --root . check

      - name: Normative promises are valid
        run: python3 promisify/scripts/norms.py validate .
