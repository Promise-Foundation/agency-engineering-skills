[[limitations]]
id = "LIM-01"
status = "open"
text = "Pilot systems are algorithmic reference arms, not independently developed learned models."

[[limitations]]
id = "LIM-02"
status = "open"
text = "The test-split seal prevents accidental access but is not a defense against a malicious machine operator."

[[limitations]]
id = "LIM-03"
status = "open"
text = "Authority separation is application-enforced inside one process rather than process-isolated."

[[limitations]]
id = "LIM-04"
status = "open"
text = "Human comprehension, calibration, review, and operational-cost benefits have not been tested externally."

[[limitations]]
id = "LIM-05"
status = "open"
text = "Full open-world inquiry and complete endoporeutic game semantics are not implemented."
