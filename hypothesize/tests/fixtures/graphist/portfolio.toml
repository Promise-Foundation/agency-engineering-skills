schema_version = 1
title = "Graphist research portfolio"
last_reviewed = "2026-07-14"
thesis = "Graphist can make machine reasoning and machine action explicit, challengeable, verifiable, and auditable."

[[tracks]]
id = "learn"
title = "Graphist Learn"
description = "Representation, abstraction, transfer, and search."

[[tracks]]
id = "verify"
title = "Graphist Verify"
description = "Independent checking and replayable assurance."

[[tracks]]
id = "explain"
title = "Graphist Explain"
description = "Faithful explanation, contestability, and fault localization."

[[tracks]]
id = "audit"
title = "Graphist Audit"
description = "Provenance, reconstruction, and epistemic status."

[[tracks]]
id = "govern"
title = "Graphist Govern"
description = "Authority separation and controlled action."

[[tracks]]
id = "inquire"
title = "Graphist Inquire"
description = "Model-independent and human-machine collaboration."

[[hypotheses]]
id = "GH-LRN"
title = "Learning and performance"
statement = "Graph-native representations and Gamma abstractions improve accuracy, structural transfer, sample efficiency, or search relative to equally informed strong baselines."
summary = "T1/T2 show no basic binding advantage; graph-native T3 mechanisms exist, but the decisive independent comparison has not run."
tracks = ["learn"]

[[hypotheses]]
id = "GH-VER"
title = "Verification and assurance"
statement = "Useful classes of structural operations can be checked independently and accepted with replayable certificates."
summary = "Strong bounded mechanism evidence exists in the kernel, certificate replay, mutation tests, and differential checker; external utility is untested."
tracks = ["verify"]

[[hypotheses]]
id = "GH-AUD"
title = "Auditability and provenance"
statement = "Explicit states, transformations, evidence, authority, and history make consequential activity more reliably reconstructible than ordinary outputs or logs."
summary = "Strong mechanism evidence exists; comparative operational and human studies remain open."
tracks = ["audit"]

[[hypotheses]]
id = "GH-EXP"
title = "Faithful explainability and contestability"
statement = "Explanations derived from the operative graph and checked witnesses expose the basis, limits, and consequences of a result more faithfully than post-hoc narrative alone."
summary = "Partial mechanism support exists; human comprehension, calibration, and actionability are untested."
tracks = ["explain"]

[[hypotheses]]
id = "GH-CHL"
title = "Challengeability and repair"
statement = "Independently generated, kernel-checked counterexamples or rejection reasons improve error detection, revision, and final decision quality."
summary = "A bounded discovery-and-revision mechanism exists; there is no externally valid comparative result."
tracks = ["explain", "inquire"]

[[hypotheses]]
id = "GH-GOV"
title = "Governance and authority separation"
statement = "Separating proposal, verification, challenge, adjudication, evaluation, and commitment reduces self-certification and unsafe action."
summary = "Application and architectural mechanisms exist; organizational effectiveness is untested."
tracks = ["govern"]

[[hypotheses]]
id = "GH-INT"
title = "Interoperability and model independence"
statement = "A shared typed graph IR and small checking boundary can mediate learned, symbolic, human, and tool-based components without trusting their internal reasoning."
summary = "Multiple ports and representations are implemented; portability across independent ecosystems is untested."
tracks = ["inquire"]

[[hypotheses]]
id = "GH-HMI"
title = "Human-machine inquiry"
statement = "Explicit proposals, evidence, objections, unknowns, and revisions improve collaborative inquiry compared with polished answers or transcript-only workflows."
summary = "Bounded inquiry mechanisms exist; comparative human evidence is absent."
tracks = ["inquire"]

[[hypotheses]]
id = "GH-DBG"
title = "Debuggability and forensics"
statement = "Explicit lineage, typed failures, and replayable transitions reduce the time and ambiguity involved in fault localization, incident reconstruction, and rollback."
summary = "The mechanism is partly embodied in traces and the rejection taxonomy; an operational study is needed."
tracks = ["explain"]

[[hypotheses]]
id = "GH-SAF"
title = "Safe automation and change control"
statement = "Independently checking an AI-proposed change before commitment reduces unsafe accepted changes without making useful automation impractical."
summary = "The core verification mechanism exists; domain-specific safety and cost evidence is untested."
tracks = ["verify", "govern"]

[[hypotheses]]
id = "GH-EPI"
title = "Epistemic discipline"
statement = "Explicit evidential states and decision rules reduce conflation of proposed, unrefuted, supported, falsified, and inconclusive claims."
summary = "The discipline is implemented in experiment and inquiry designs; its effect on real decisions is untested."
tracks = ["audit"]

[[hypotheses]]
id = "GH-EFF"
title = "Computational practicality"
statement = "Graphist advantages can be obtained at a resource cost appropriate to their setting rather than through dramatically greater search, data, or latency."
summary = "Resource accounting exists in parts of the harness, but no general efficiency claim is supported."
tracks = ["learn"]

